name: Bug report
description: Something's broken. Help us fix it.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in as much as you can. **Security issues go to lw.arts.designer@gmail.com, not here.**
  - type: textarea
    id: summary
    attributes:
      label: What broke
      description: One sentence on what went wrong.
      placeholder: "`trenchkit scan --chain base` returns 0 tokens even when trending has results."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands, from a fresh terminal. Redact any API key.
      render: bash
      placeholder: |
        trenchkit init
        trenchkit scan --chain base --min-score 50
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What should happen, and what actually happens.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: trenchkit version
      description: Output of `trenchkit --version` (or git SHA if running from source).
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      description: e.g., macOS 15.2, Ubuntu 24.04, Windows WSL2.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Copy error text or stack traces. Redact API keys.
      render: text
  - type: checkboxes
    id: checked
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues before opening this one.
          required: true
        - label: I redacted any API keys, private keys, or wallet addresses belonging to other people.
          required: true
